<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Edit Transaction</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}"
    >
</head>


<body>

    <div class="container">

        <header>
            <h1>Edit Transaction</h1>

            <p>
                Update your transaction information.
            </p>
        </header>


        <div class="form-container edit-container">

            <form
                action="{{ url_for('edit_transaction', transaction_id=transaction['id']) }}"
                method="POST"
            >

                <label for="title">
                    Title
                </label>

                <input
                    type="text"
                    id="title"
                    name="title"
                    value="{{ transaction['title'] }}"
                    required
                >


                <label for="amount">
                    Amount
                </label>

                <input
                    type="number"
                    id="amount"
                    name="amount"
                    step="any"
                    min="0.01"
                    value="{{ transaction['amount'] }}"
                    required
                >


                <label for="transaction_type">
                    Transaction Type
                </label>

                <select
                    id="transaction_type"
                    name="transaction_type"
                    required
                >

                    <option
                        value="Income"
                        {% if transaction["transaction_type"] == "Income" %}
                        selected
                        {% endif %}
                    >
                        Income
                    </option>

                    <option
                        value="Expense"
                        {% if transaction["transaction_type"] == "Expense" %}
                        selected
                        {% endif %}
                    >
                        Expense
                    </option>

                </select>


                <label for="category">
                    Category
                </label>

                <select
                    id="category"
                    name="category"
                    required
                >

                    {% for category in [
                        "Food",
                        "Transport",
                        "Shopping",
                        "Bills",
                        "Entertainment",
                        "Other"
                    ] %}

                    <option
                        value="{{ category }}"
                        {% if transaction["category"] == category %}
                        selected
                        {% endif %}
                    >
                        {{ category }}
                    </option>

                    {% endfor %}

                </select>


                <label for="date">
                    Date
                </label>

                <input
                    type="date"
                    id="date"
                    name="date"
                    value="{{ transaction['date'] }}"
                    required
                >


                <button type="submit">
                    Update Transaction
                </button>

            </form>


            <a
                href="{{ url_for('home') }}"
                class="cancel-link"
            >
                Cancel and Return to Dashboard
            </a>

        </div>

    </div>

</body>

</html>
